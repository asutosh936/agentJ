# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/agentJ

# ── Anthropic / Claude API ───────────────────────────────────────────────────
# Set your API key as an environment variable:  export ANTHROPIC_API_KEY=sk-ant-...
# Or create a .env file (see .env.example) and export before running.
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.api.url=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=1024

# ── Logging ──────────────────────────────────────────────────────────────────
# INFO shows agent iteration steps and tool calls
# DEBUG also shows the raw request/response details
logging.level.com.agent.agentj=INFO
